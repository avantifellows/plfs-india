# aishe_fact_ug_discipline_extrapolated
#
# DERIVED — linear projection of the 2019-22 panel forward to AY 2024-25 and
# 2025-26, per (metric, discipline, gender). Ordinary least-squares fit on the
# 3 observed years; estimates floored at 0. These are MODEL ESTIMATES, not
# AISHE-published figures — use for directional capacity planning only.
#
# Source parquet: gs://avantifellows-external-data/aishe/ug_discipline_extrapolated.parquet
# BQ table:       avantifellows.external_data_sources.aishe_fact_ug_discipline_extrapolated

description: Linear extrapolation of UG enrolment + out-turn by discipline to 2024-26. Model estimates, not published data.
rows: 432
grain: (target_year, metric, discipline, gender)

columns:
  - name: target_year
    type: STRING
    mode: REQUIRED
    description: Projected academic year — "2024-25" or "2025-26".

  - name: metric
    type: STRING
    mode: REQUIRED
    description: '"enrolment" or "out_turn".'

  - name: discipline
    type: STRING
    mode: REQUIRED
    description: AISHE major discipline.

  - name: gender
    type: STRING
    mode: REQUIRED
    description: Male, Female, or Total.

  - name: value_estimate
    type: INTEGER
    mode: REQUIRED
    description: Projected count (rounded; floored at 0).

  - name: method
    type: STRING
    mode: NULLABLE
    description: Fit description, e.g. "linear fit on 3 years (2019-22)".

  - name: slope_per_year
    type: FLOAT
    mode: NULLABLE
    description: Fitted slope (change in value per academic year).

  - name: base_year
    type: STRING
    mode: NULLABLE
    description: Last observed year used as the growth base, e.g. "2021-22".

  - name: base_year_value
    type: INTEGER
    mode: NULLABLE
    description: Observed value in the base year.

  - name: years_extrapolated
    type: INTEGER
    mode: NULLABLE
    description: Number of years projected beyond the base year.

  - name: growth_pct_total
    type: FLOAT
    mode: NULLABLE
    description: Total percent change from base_year_value to value_estimate.
