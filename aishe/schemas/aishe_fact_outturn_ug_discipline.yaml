# aishe_fact_outturn_ug_discipline
#
# AISHE Table 35 — UG out-turn by major discipline (AISHE's ~40-discipline
# taxonomy: Engineering & Technology, Arts, Science, Commerce, Indian Language,
# Social Science, …). Discipline-level totals only; sub-disciplines are not
# retained. One row per (aishe_year, discipline, gender).
#
# Source sheet: 35UGDisc.
# Source parquet: gs://avantifellows-external-data/aishe/outturn_ug_discipline.parquet
# BQ table:       avantifellows.external_data_sources.aishe_fact_outturn_ug_discipline
#
# Validation: sum(out_turn where gender='Total') = 7,754,223, which equals the
# UG total in Table 33 summed across states.

description: AISHE UG out-turn by major discipline and gender (Table 35).
rows: 120
grain: (aishe_year, discipline, gender)

columns:
  - name: aishe_year
    type: STRING
    mode: REQUIRED
    description: AISHE survey academic year, e.g. "2021-22".

  - name: discipline
    type: STRING
    mode: REQUIRED
    description: AISHE major discipline (subject-based taxonomy from Table 35).

  - name: gender
    type: STRING
    mode: REQUIRED
    description: Male, Female, or Total.

  - name: out_turn
    type: INTEGER
    mode: REQUIRED
    description: UG qualifiers (graduates) in that discipline/gender cell.
