# aishe_fact_outturn_discipline_social_category
#
# DERIVED — not published by AISHE. Table 34a (programme x social category) is
# rolled up to AISHE discipline level using the heuristic programme->discipline
# codemap (aishe_dim_programme_discipline_map). National-level only.
#
# IMPORTANT CAVEAT: Table 34a (degree programme) and Table 35 (subject-based
# discipline) use incompatible classification paradigms. This rollup maps by
# DEGREE NAME, so subject-based disciplines (Indian Language, Social Science,
# Foreign Language, …) are NOT recoverable — those students sit in B.A./M.A./
# B.Sc. programmes and roll up to Arts/Science here. Reliable for disciplines
# served by named degrees (Engineering & Technology, Medical Science, Law,
# Management, Education, Commerce, IT & Computer, …). Arts and Science are
# OVER-counted. See README for the full reliable/unreliable breakdown.
#
# Source parquet: gs://avantifellows-external-data/aishe/outturn_discipline_social_category.parquet
# BQ table:       avantifellows.external_data_sources.aishe_fact_outturn_discipline_social_category

description: AISHE out-turn rolled up from programme (Table 34a) to discipline via the codemap. Derived; degree-name based.
rows: 624
grain: (aishe_year, discipline, social_category, gender)

columns:
  - name: aishe_year
    type: STRING
    mode: REQUIRED
    description: AISHE survey academic year, e.g. "2021-22".

  - name: discipline
    type: STRING
    mode: REQUIRED
    description: AISHE discipline assigned by the programme->discipline codemap. "Others" for unmapped programmes.

  - name: social_category
    type: STRING
    mode: REQUIRED
    description: Same 8 overlapping categories as the programme table (do not sum across categories).

  - name: gender
    type: STRING
    mode: REQUIRED
    description: Male, Female, or Total.

  - name: out_turn
    type: INTEGER
    mode: REQUIRED
    description: Sum of programme-level out-turn for programmes mapped to this discipline.
