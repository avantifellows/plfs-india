# aishe_fact_outturn_state_level
#
# AISHE Table 33 — out-turn (qualifiers / graduates) by state/UT and level.
# One row per (aishe_year, state, level, gender). 36 states/UTs x 8 levels x
# 3 gender = 864 rows for 2021-22.
#
# Source sheet: 33OutTurnState in the Final Report workbook.
# Source parquet: gs://avantifellows-external-data/aishe/outturn_state_level.parquet
# BQ table:       avantifellows.external_data_sources.aishe_fact_outturn_state_level

description: AISHE out-turn by state/UT, level, and gender (Table 33).
rows: 864
grain: (aishe_year, state, level, gender)

columns:
  - name: aishe_year
    type: STRING
    mode: REQUIRED
    description: AISHE survey academic year, e.g. "2021-22".

  - name: state
    type: STRING
    mode: REQUIRED
    description: State or Union Territory name as printed in the report.

  - name: level
    type: STRING
    mode: REQUIRED
    description: >
      Programme level. One of: Ph.D., M.Phil., Post Graduate, Under Graduate,
      PG Diploma, Diploma, Certificate, Integrated.

  - name: gender
    type: STRING
    mode: REQUIRED
    description: 'Male, Female, or Total (Total = Male + Female + other genders reported).'

  - name: out_turn
    type: INTEGER
    mode: REQUIRED
    description: Number of qualifiers (graduates) in that cell. 0 where the report is blank.
