# aishe_fact_outturn_programme_social_category
#
# AISHE Table 34a — out-turn by degree programme x social category x gender.
# National-level only (the report does not publish this cut by state). 227
# programmes (B.A., B.Tech., MBBS, …) x 8 social categories x 3 gender = 5,448
# rows for 2021-22.
#
# Source sheet: 34a.
# Source parquet: gs://avantifellows-external-data/aishe/outturn_programme_social_category.parquet
# BQ table:       avantifellows.external_data_sources.aishe_fact_outturn_programme_social_category
#
# Validation: sum(out_turn where social_category='All Categories' and
# gender='Total') = 10,738,573 (all-levels India total, matches Table 33).

description: AISHE out-turn by degree programme, social category, and gender (Table 34a, national).
rows: 5448
grain: (aishe_year, programme, social_category, gender)

columns:
  - name: aishe_year
    type: STRING
    mode: REQUIRED
    description: AISHE survey academic year, e.g. "2021-22".

  - name: programme
    type: STRING
    mode: REQUIRED
    description: Degree programme name as printed in Table 34a (B.A., B.Tech., MBBS, …).

  - name: social_category
    type: STRING
    mode: REQUIRED
    description: >
      One of: All Categories, Scheduled Caste, Scheduled Tribe,
      Other Backward Classes, Persons with Disability, Muslim,
      Other Minority Communities, EWS. These overlap (e.g. an SC student is also
      in All Categories) — do not sum across categories.

  - name: gender
    type: STRING
    mode: REQUIRED
    description: Male, Female, or Total.

  - name: out_turn
    type: INTEGER
    mode: REQUIRED
    description: Qualifiers (all levels combined) in that programme/category/gender cell.
