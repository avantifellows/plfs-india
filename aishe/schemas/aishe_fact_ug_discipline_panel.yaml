# aishe_fact_ug_discipline_panel
#
# 3-year panel of UG enrolment and UG out-turn by major discipline, built from
# the 2019-20, 2020-21, and 2021-22 Final Report workbooks (sheets 12UGDisc =
# enrolment, 35UGDisc = out-turn). Long format: one row per
# (aishe_year, metric, discipline, gender).
#
# Source parquet: gs://avantifellows-external-data/aishe/ug_discipline_panel.parquet
# BQ table:       avantifellows.external_data_sources.aishe_fact_ug_discipline_panel

description: 3-year (2019-22) panel of UG enrolment + out-turn by discipline and gender.
rows: 687
grain: (aishe_year, metric, discipline, gender)

columns:
  - name: aishe_year
    type: STRING
    mode: REQUIRED
    description: AISHE survey year — "2019-20", "2020-21", or "2021-22".

  - name: metric
    type: STRING
    mode: REQUIRED
    description: '"enrolment" (students enrolled) or "out_turn" (graduates).'

  - name: discipline
    type: STRING
    mode: REQUIRED
    description: AISHE major discipline (subject-based taxonomy).

  - name: gender
    type: STRING
    mode: REQUIRED
    description: Male, Female, or Total.

  - name: value
    type: INTEGER
    mode: REQUIRED
    description: Count of students (enrolment) or graduates (out_turn) for that cell.
