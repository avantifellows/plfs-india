# aishe_dim_programme_discipline_map
#
# Codemap dimension: the heuristic mapping from each Table 34a degree programme
# to an AISHE discipline. Built by scripts/build_programme_map.py from programme
# names (longest/most-specific pattern wins), and committed as the auditable
# CSV codemaps/programme_to_discipline.csv. Used to derive
# aishe_fact_outturn_discipline_social_category.
#
# Source CSV: aishe/codemaps/programme_to_discipline.csv  (committed)
# Source parquet: gs://avantifellows-external-data/aishe/programme_discipline_map.parquet
# BQ table:       avantifellows.external_data_sources.aishe_dim_programme_discipline_map

description: Heuristic programme-name -> AISHE discipline mapping (audit dimension for the discipline rollup).
rows: 227
grain: (programme)

columns:
  - name: programme
    type: STRING
    mode: REQUIRED
    description: Exact programme name as in Table 34a. Joins to aishe_fact_outturn_programme_social_category.programme.

  - name: discipline
    type: STRING
    mode: REQUIRED
    description: Assigned AISHE discipline.

  - name: matched_pattern
    type: STRING
    mode: NULLABLE
    description: The name pattern that matched (for audit).

  - name: confidence
    type: STRING
    mode: NULLABLE
    description: Mapping confidence — high, medium, or low.

  - name: notes
    type: STRING
    mode: NULLABLE
    description: Short explanation of any judgment call. Empty for unambiguous matches.
