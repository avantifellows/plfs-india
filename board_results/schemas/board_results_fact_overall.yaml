# board_results_fact_overall
#
# Class X (Secondary) + Class XII (Higher Secondary) overall board-exam results:
# Annual + Supplementary, Regular + Private, All Categories. One row per
# (year, level, state, board, gender). ~1,026 rows across 2020/2021/2022/2024.
#
# Source: MoE "Result of Secondary & Higher Secondary Examination" PDFs,
#   Section A Table 3/1 (Class X) and Section B Table 3/1 (Class XII).
# Source parquet: gs://avantifellows-external-data/board_results/clean/overall_class_x_xii.parquet
# BQ table:       avantifellows.external_data_sources.board_results_fact_overall
#
# Validation (all-India sum of board Totals, passed_annual_and_supp):
#   2020 Class X 15,768,194 / Class XII 12,155,004
#   2024 Class X 16,337,153 / Class XII 12,929,386

description: Class X + XII overall board-exam results (registered/appeared/passed/pass%) by board, year, gender.
rows: 1026
grain: (year, level, state, board, gender)

columns:
  - name: year
    type: INTEGER
    mode: REQUIRED
    description: Exam year — 2020, 2021, 2022, or 2024 (no 2023 edition published).

  - name: level
    type: STRING
    mode: REQUIRED
    description: '"Class X" (Secondary) or "Class XII" (Higher Secondary).'

  - name: state
    type: STRING
    mode: NULLABLE
    description: State/UT or "Central". Forward-filled from the report's grouping column.

  - name: board
    type: STRING
    mode: REQUIRED
    description: >
      Board name as printed (line breaks normalized to spaces). Names vary
      slightly across years — fuzzy-join on key tokens (CBSE, CISCE, state name)
      rather than exact-match for trend analysis.

  - name: gender
    type: STRING
    mode: REQUIRED
    description: Boys, Girls, or Total.

  - name: registered
    type: INTEGER
    mode: NULLABLE
    description: Students registered (Regular + Private). NULL for 2020/2021 — that report layout omitted the Registered column.

  - name: appeared
    type: INTEGER
    mode: NULLABLE
    description: Students appeared (Regular + Private).

  - name: passed_annual_and_supp
    type: INTEGER
    mode: NULLABLE
    description: Students passed, Annual + Supplementary combined.

  - name: pass_percentage
    type: FLOAT
    mode: NULLABLE
    description: Pass rate (%) as printed in the report.
