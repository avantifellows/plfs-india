# board_results_fact_class_xii_stream
#
# Class XII stream-wise pass counts (All Streams / Arts / Commerce / Science /
# Vocational), by board × year × social category × gender. One row per
# (year, state, board, social_category, stream, gender). 5,567 rows
# (blacked-out cells are dropped, not stored as 0).
#
# Source: MoE report PDFs, Section B Tables 13/15/17 (2020/2021) and 31/33/35
#   (2022/2024) for All-Categories / Scheduled Caste / Scheduled Tribe.
# Source parquet: gs://avantifellows-external-data/board_results/clean/class_xii_stream.parquet
# BQ table:       avantifellows.external_data_sources.board_results_fact_class_xii_stream
#
# Caveats (see README): CBSE per-stream split is blacked out for 2020 & 2021
# (only its All-Streams total is published); the 2020 PDF layout is parsed with
# a positional heuristic. Class X has no stream cut by design.

description: Class XII pass counts by stream, board, year, social category, and gender.
rows: 5567
grain: (year, state, board, social_category, stream, gender)

columns:
  - name: year
    type: INTEGER
    mode: REQUIRED
    description: Exam year — 2020, 2021, 2022, or 2024.

  - name: state
    type: STRING
    mode: NULLABLE
    description: State/UT or "Central". Forward-filled from the report's grouping column.

  - name: board
    type: STRING
    mode: REQUIRED
    description: Board name as printed (whitespace normalized). Fuzzy-join on key tokens for trend analysis.

  - name: social_category
    type: STRING
    mode: REQUIRED
    description: >
      "All Categories", "Scheduled Caste", or "Scheduled Tribe". These overlap
      (SC/ST ⊂ All Categories) — do not sum across categories.

  - name: stream
    type: STRING
    mode: REQUIRED
    description: >
      "All Streams" (total), "Arts", "Commerce", "Science", or "Vocational".
      "All Streams" is the total; the four streams sum to it where all are
      published.

  - name: gender
    type: STRING
    mode: REQUIRED
    description: Boys, Girls, or Total.

  - name: students_passed
    type: INTEGER
    mode: REQUIRED
    description: >
      Students passed (Annual + Supplementary, Regular + Private). Blacked-out
      cells in the source are omitted rather than recorded as 0.
